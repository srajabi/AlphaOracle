name: AlphaOracle Daily Run

on:
  schedule:
    # 10:00 AM ET and 3:30 PM ET, Monday-Friday.
    # NOTE: GitHub cron uses UTC; these map exactly during EST (UTC-5).
    - cron: '0 15 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch: # Allow manual triggering

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper git operations

      - name: Pull latest changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main || {
            echo "Pull failed, checking status..."
            git status
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Cache pip dependencies
      
      - name: Create and Activate Virtual Environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Portfolio State From Alpaca (Dev Account)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
        run: python src/fetch_alpaca_portfolio.py

      - name: Fetch Trade History From Alpaca (Dev Account)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
        run: python src/fetch_alpaca_trades.py

      - name: Run Data Ingestion
        run: python src/data_ingestion.py

      - name: Run Options Ingestion
        run: python src/options_ingestion.py

      - name: Generate Strategy Ratings
        run: python src/generate_strategy_ratings.py

      - name: Generate Intermarket Indicators
        run: python src/generate_indicators.py

      - name: Generate Per-Ticker Indicators
        run: python src/generate_ticker_indicators.py

      - name: Run LLM Agents
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RISK_MODELS: "deepseek/deepseek-reasoner,gemini/gemini-2.5-flash"
          TECH_MODELS: "deepseek/deepseek-reasoner,gemini/gemini-2.5-flash"
          MACRO_MODELS: "deepseek/deepseek-reasoner,gemini/gemini-2.5-flash"
          PM_MODEL: "deepseek/deepseek-reasoner"
        run: python src/llm_agents.py
        
      - name: Execute Advanced LLM Strategy (Dev Account - 2x Daily)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: Advanced LLM Strategy (Dev Account)"
          echo "Frequency: 2x daily (10 AM and 3:30 PM ET)"
          echo "Note: This uses a more sophisticated/active LLM approach"
          echo "=================================================="
          python src/execute_advanced_llm.py
          echo ""

      - name: Execute Multi-Account Trades
        env:
          # Dev account (for manual/testing runs)
          ALPACA_DEV_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_DEV_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
          # Prod accounts (for scheduled runs)
          ALPACA_PROD_1_API_KEY: ${{ secrets.ALPACA_PROD_1_API_KEY }}
          ALPACA_PROD_1_SECRET_KEY: ${{ secrets.ALPACA_PROD_1_SECRET_KEY }}
          ALPACA_PROD_2_API_KEY: ${{ secrets.ALPACA_PROD_2_API_KEY }}
          ALPACA_PROD_2_SECRET_KEY: ${{ secrets.ALPACA_PROD_2_SECRET_KEY }}
          ALPACA_PROD_3_API_KEY: ${{ secrets.ALPACA_PROD_3_API_KEY }}
          ALPACA_PROD_3_SECRET_KEY: ${{ secrets.ALPACA_PROD_3_SECRET_KEY }}
          ALPACA_PROD_4_API_KEY: ${{ secrets.ALPACA_PROD_4_API_KEY }}
          ALPACA_PROD_4_SECRET_KEY: ${{ secrets.ALPACA_PROD_4_SECRET_KEY }}
          ALPACA_PROD_5_API_KEY: ${{ secrets.ALPACA_PROD_5_API_KEY }}
          ALPACA_PROD_5_SECRET_KEY: ${{ secrets.ALPACA_PROD_5_SECRET_KEY }}
          # Environment selection: dev for manual, prod for scheduled
          ALPACA_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && 'dev' || 'prod' }}
        run: python src/execute_multi_account.py

      # ========================================================================
      # EOD STRATEGY EXECUTION (3:30 PM ET run only)
      # ========================================================================

      - name: Check if this is the EOD execution run
        id: check_time
        run: |
          HOUR=$(date -u +%H)
          echo "Current UTC hour: $HOUR"
          if [ "$HOUR" = "20" ]; then
            echo "is_eod=true" >> $GITHUB_OUTPUT
            echo "This is the 3:30 PM ET (20:30 UTC) run - executing strategies"
          else
            echo "is_eod=false" >> $GITHUB_OUTPUT
            echo "This is the 10:00 AM ET (15:00 UTC) run - skipping strategy execution"
          fi

      - name: Execute LLM Strategy (Account 1 - EOD)
        if: steps.check_time.outputs.is_eod == 'true'
        env:
          ALPACA_PROD_1_API_KEY: ${{ secrets.ALPACA_PROD_1_API_KEY }}
          ALPACA_PROD_1_SECRET_KEY: ${{ secrets.ALPACA_PROD_1_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: LLM Strategy (Account 1 - EOD)"
          echo "Using recommendations from data/trades.json"
          echo "=================================================="
          python src/execute_trades.py
          echo ""

      - name: Execute TQQQ Momentum Strategy (Account 2)
        if: steps.check_time.outputs.is_eod == 'true'
        env:
          ALPACA_PROD_2_API_KEY: ${{ secrets.ALPACA_PROD_2_API_KEY }}
          ALPACA_PROD_2_SECRET_KEY: ${{ secrets.ALPACA_PROD_2_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: TQQQ Momentum Strategy (Account 2)"
          echo "=================================================="
          python src/strategies/strategy_executor.py --strategy tqqq --account 2
          echo ""

      - name: Execute Dual Momentum Strategy (Account 3)
        if: steps.check_time.outputs.is_eod == 'true'
        env:
          ALPACA_PROD_3_API_KEY: ${{ secrets.ALPACA_PROD_3_API_KEY }}
          ALPACA_PROD_3_SECRET_KEY: ${{ secrets.ALPACA_PROD_3_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: Dual Momentum Strategy (Account 3)"
          echo "=================================================="
          python src/strategies/strategy_executor.py --strategy dual --account 3
          echo ""

      - name: Execute Sector Rotation Strategy (Account 4)
        if: steps.check_time.outputs.is_eod == 'true'
        env:
          ALPACA_PROD_4_API_KEY: ${{ secrets.ALPACA_PROD_4_API_KEY }}
          ALPACA_PROD_4_SECRET_KEY: ${{ secrets.ALPACA_PROD_4_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: Sector Rotation Strategy (Account 4)"
          echo "=================================================="
          python src/strategies/strategy_executor.py --strategy sector --account 4
          echo ""

      - name: Execute Mean Reversion Strategy (Account 5)
        if: steps.check_time.outputs.is_eod == 'true'
        env:
          ALPACA_PROD_5_API_KEY: ${{ secrets.ALPACA_PROD_5_API_KEY }}
          ALPACA_PROD_5_SECRET_KEY: ${{ secrets.ALPACA_PROD_5_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: Mean Reversion Strategy (Account 5)"
          echo "=================================================="
          python src/strategies/strategy_executor.py --strategy mean --account 5
          echo ""

      - name: Fetch Live Portfolio State (Dev Account)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
        run: python src/fetch_alpaca_portfolio.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build Frontend
        working-directory: frontend
        run: |
          npm ci
          # Work around npm optional-dependency resolution bug on CI runners.
          ROLLUP_VERSION=$(node -p "require('./node_modules/rollup/package.json').version")
          ROLLUP_PKG="@rollup/rollup-linux-x64-gnu"
          node -e "require.resolve(process.argv[1])" "$ROLLUP_PKG" >/dev/null 2>&1 || npm i --no-save "${ROLLUP_PKG}@${ROLLUP_VERSION}"
          npm run build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          
      - name: Commit newly generated data and content back to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Add all generated data
          git add data/ frontend/src/content/reports/ frontend/public/data/ portfolio.csv watchlist.csv

          # Commit and push with retry logic
          if git commit -m "chore: Daily AI analysis reports for $(date +'%Y-%m-%d')"; then
            echo "Pushing changes..."
            git pull --rebase origin main || true
            git push || {
              echo "Push failed, retrying once..."
              sleep 5
              git pull --rebase origin main
              git push
            }
          else
            echo "No changes to commit"
          fi
