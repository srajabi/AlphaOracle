name: AlphaOracle Daily Run

on:
  schedule:
    # 10:00 AM ET and 3:30 PM ET, Monday-Friday.
    # NOTE: GitHub cron uses UTC; these map exactly during EST (UTC-5).
    - cron: '0 15 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch: # Allow manual triggering

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper git operations

      - name: Pull latest changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main || {
            echo "Pull failed, checking status..."
            git status
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Cache pip dependencies
      
      - name: Create and Activate Virtual Environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Portfolio State From Alpaca (All 6 Accounts)
        id: sync_portfolio
        continue-on-error: true
        env:
          ALPACA_DEV_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_DEV_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
          ALPACA_PROD_1_API_KEY: ${{ secrets.ALPACA_PROD_1_API_KEY }}
          ALPACA_PROD_1_SECRET_KEY: ${{ secrets.ALPACA_PROD_1_SECRET_KEY }}
          ALPACA_PROD_2_API_KEY: ${{ secrets.ALPACA_PROD_2_API_KEY }}
          ALPACA_PROD_2_SECRET_KEY: ${{ secrets.ALPACA_PROD_2_SECRET_KEY }}
          ALPACA_PROD_3_API_KEY: ${{ secrets.ALPACA_PROD_3_API_KEY }}
          ALPACA_PROD_3_SECRET_KEY: ${{ secrets.ALPACA_PROD_3_SECRET_KEY }}
          ALPACA_PROD_4_API_KEY: ${{ secrets.ALPACA_PROD_4_API_KEY }}
          ALPACA_PROD_4_SECRET_KEY: ${{ secrets.ALPACA_PROD_4_SECRET_KEY }}
          ALPACA_PROD_5_API_KEY: ${{ secrets.ALPACA_PROD_5_API_KEY }}
          ALPACA_PROD_5_SECRET_KEY: ${{ secrets.ALPACA_PROD_5_SECRET_KEY }}
        run: python src/fetch_alpaca_portfolio.py

      - name: Fetch Trade History From Alpaca (Dev Account)
        id: fetch_trades
        continue-on-error: true
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
        run: python src/fetch_alpaca_trades.py

      # ========================================================================
      # ANALYSIS STEPS
      # All use continue-on-error so a failure (e.g. exhausted LLM credits,
      # yfinance outage) never blocks the rule-based strategy execution below.
      # The "Report step failures" step at the end still fails the run for
      # visibility if anything broke.
      # ========================================================================

      - name: Run Data Ingestion
        id: data_ingestion
        continue-on-error: true
        run: python src/data_ingestion.py

      - name: Run Options Ingestion
        id: options_ingestion
        continue-on-error: true
        run: python src/options_ingestion.py

      - name: Generate Strategy Ratings
        id: strategy_ratings
        continue-on-error: true
        run: python src/generate_strategy_ratings.py

      - name: Generate Intermarket Indicators
        id: intermarket_indicators
        continue-on-error: true
        run: python src/generate_indicators.py

      - name: Generate Per-Ticker Indicators
        id: ticker_indicators
        continue-on-error: true
        run: python src/generate_ticker_indicators.py

      - name: Run LLM Agents
        id: llm_agents
        # Skip (rather than analyze stale data) if ingestion failed.
        if: steps.data_ingestion.outcome == 'success'
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # deepseek-v4-flash ($0.14/$0.28 per 1M tokens) replaces both the
          # deepseek-reasoner alias (retired by DeepSeek on 2026-07-24) and
          # gemini-2.5-flash ($0.15/$0.60). Thinking mode is the default.
          RISK_MODELS: "deepseek/deepseek-v4-flash"
          TECH_MODELS: "deepseek/deepseek-v4-flash"
          MACRO_MODELS: "deepseek/deepseek-v4-flash"
          PM_MODEL: "deepseek/deepseek-v4-flash"
        run: python src/llm_agents.py

      - name: Execute Advanced LLM Strategy (Dev Account - 2x Daily)
        id: advanced_llm
        continue-on-error: true
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: Advanced LLM Strategy (Dev Account)"
          echo "Frequency: 2x daily (10 AM and 3:30 PM ET)"
          echo "Note: This uses a more sophisticated/active LLM approach"
          echo "=================================================="
          python src/execute_advanced_llm.py
          echo ""

      # ========================================================================
      # EOD STRATEGY EXECUTION (3:30 PM ET run only)
      # ========================================================================

      - name: Check if this is the EOD execution run
        id: check_time
        run: |
          HOUR=$(date -u +%H)
          echo "Current UTC hour: $HOUR"
          if [ "$HOUR" = "20" ]; then
            echo "is_eod=true" >> $GITHUB_OUTPUT
            echo "This is the 3:30 PM ET (20:30 UTC) run - executing strategies"
          else
            echo "is_eod=false" >> $GITHUB_OUTPUT
            echo "This is the 10:00 AM ET (15:00 UTC) run - skipping strategy execution"
          fi

      - name: Execute LLM Strategy (Account 1 - EOD)
        id: execute_llm_account1
        # Only execute on fresh LLM output; execute_trades.py also refuses
        # stale trades.json via data/trades_meta.json as a second guard.
        if: steps.check_time.outputs.is_eod == 'true' && steps.llm_agents.outcome == 'success'
        continue-on-error: true
        env:
          ALPACA_PROD_1_API_KEY: ${{ secrets.ALPACA_PROD_1_API_KEY }}
          ALPACA_PROD_1_SECRET_KEY: ${{ secrets.ALPACA_PROD_1_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: LLM Strategy (Account 1 - EOD)"
          echo "Using recommendations from data/trades.json"
          echo "=================================================="
          python src/execute_trades.py
          echo ""

      # Rule-based strategies (Accounts 2-5) have no LLM dependency: they
      # fetch their own data and only need Alpaca keys. Each is isolated so
      # one failure cannot block the others.

      - name: Execute TQQQ Momentum Strategy (Account 2)
        id: execute_tqqq
        if: steps.check_time.outputs.is_eod == 'true'
        continue-on-error: true
        env:
          ALPACA_PROD_2_API_KEY: ${{ secrets.ALPACA_PROD_2_API_KEY }}
          ALPACA_PROD_2_SECRET_KEY: ${{ secrets.ALPACA_PROD_2_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: TQQQ Momentum Strategy (Account 2)"
          echo "=================================================="
          python src/strategies/strategy_executor.py --strategy tqqq --account 2
          echo ""

      - name: Execute Dual Momentum Strategy (Account 3)
        id: execute_dual
        if: steps.check_time.outputs.is_eod == 'true'
        continue-on-error: true
        env:
          ALPACA_PROD_3_API_KEY: ${{ secrets.ALPACA_PROD_3_API_KEY }}
          ALPACA_PROD_3_SECRET_KEY: ${{ secrets.ALPACA_PROD_3_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: Dual Momentum Strategy (Account 3)"
          echo "=================================================="
          python src/strategies/strategy_executor.py --strategy dual --account 3
          echo ""

      - name: Execute Sector Rotation Strategy (Account 4)
        id: execute_sector
        if: steps.check_time.outputs.is_eod == 'true'
        continue-on-error: true
        env:
          ALPACA_PROD_4_API_KEY: ${{ secrets.ALPACA_PROD_4_API_KEY }}
          ALPACA_PROD_4_SECRET_KEY: ${{ secrets.ALPACA_PROD_4_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: Sector Rotation Strategy (Account 4)"
          echo "=================================================="
          python src/strategies/strategy_executor.py --strategy sector --account 4
          echo ""

      - name: Execute Mean Reversion Strategy (Account 5)
        id: execute_mean
        if: steps.check_time.outputs.is_eod == 'true'
        continue-on-error: true
        env:
          ALPACA_PROD_5_API_KEY: ${{ secrets.ALPACA_PROD_5_API_KEY }}
          ALPACA_PROD_5_SECRET_KEY: ${{ secrets.ALPACA_PROD_5_SECRET_KEY }}
        run: |
          echo "=================================================="
          echo "EXECUTING: Mean Reversion Strategy (Account 5)"
          echo "=================================================="
          python src/strategies/strategy_executor.py --strategy mean --account 5
          echo ""

      - name: Fetch Live Portfolio State (All 6 Accounts)
        id: fetch_portfolio_final
        continue-on-error: true
        env:
          ALPACA_DEV_API_KEY: ${{ secrets.ALPACA_DEV_API_KEY }}
          ALPACA_DEV_SECRET_KEY: ${{ secrets.ALPACA_DEV_SECRET_KEY }}
          ALPACA_PROD_1_API_KEY: ${{ secrets.ALPACA_PROD_1_API_KEY }}
          ALPACA_PROD_1_SECRET_KEY: ${{ secrets.ALPACA_PROD_1_SECRET_KEY }}
          ALPACA_PROD_2_API_KEY: ${{ secrets.ALPACA_PROD_2_API_KEY }}
          ALPACA_PROD_2_SECRET_KEY: ${{ secrets.ALPACA_PROD_2_SECRET_KEY }}
          ALPACA_PROD_3_API_KEY: ${{ secrets.ALPACA_PROD_3_API_KEY }}
          ALPACA_PROD_3_SECRET_KEY: ${{ secrets.ALPACA_PROD_3_SECRET_KEY }}
          ALPACA_PROD_4_API_KEY: ${{ secrets.ALPACA_PROD_4_API_KEY }}
          ALPACA_PROD_4_SECRET_KEY: ${{ secrets.ALPACA_PROD_4_SECRET_KEY }}
          ALPACA_PROD_5_API_KEY: ${{ secrets.ALPACA_PROD_5_API_KEY }}
          ALPACA_PROD_5_SECRET_KEY: ${{ secrets.ALPACA_PROD_5_SECRET_KEY }}
        run: python src/fetch_alpaca_portfolio.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build Frontend
        working-directory: frontend
        run: |
          npm ci
          # Work around npm optional-dependency resolution bug on CI runners.
          ROLLUP_VERSION=$(node -p "require('./node_modules/rollup/package.json').version")
          ROLLUP_PKG="@rollup/rollup-linux-x64-gnu"
          node -e "require.resolve(process.argv[1])" "$ROLLUP_PKG" >/dev/null 2>&1 || npm i --no-save "${ROLLUP_PKG}@${ROLLUP_VERSION}"
          npm run build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          
      - name: Commit newly generated data and content back to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Add all generated data
          git add data/ frontend/src/content/reports/ frontend/public/data/ portfolio.csv watchlist.csv

          # Commit and push with retry logic
          if git commit -m "chore: Daily AI analysis reports for $(date +'%Y-%m-%d')"; then
            echo "Pushing changes..."
            git pull --rebase origin main || true
            git push || {
              echo "Push failed, retrying once..."
              sleep 5
              git pull --rebase origin main
              git push
            }
          else
            echo "No changes to commit"
          fi

      # continue-on-error above keeps trading alive through partial failures,
      # but we still want the run marked red when something broke.
      - name: Report step failures
        if: always()
        run: |
          failed=""
          check() {
            if [ "$2" = "failure" ]; then
              failed="$failed $1"
            fi
          }
          check "sync_portfolio"          "${{ steps.sync_portfolio.outcome }}"
          check "fetch_trades"            "${{ steps.fetch_trades.outcome }}"
          check "data_ingestion"          "${{ steps.data_ingestion.outcome }}"
          check "options_ingestion"       "${{ steps.options_ingestion.outcome }}"
          check "strategy_ratings"        "${{ steps.strategy_ratings.outcome }}"
          check "intermarket_indicators"  "${{ steps.intermarket_indicators.outcome }}"
          check "ticker_indicators"       "${{ steps.ticker_indicators.outcome }}"
          check "llm_agents"              "${{ steps.llm_agents.outcome }}"
          check "advanced_llm"            "${{ steps.advanced_llm.outcome }}"
          check "execute_llm_account1"    "${{ steps.execute_llm_account1.outcome }}"
          check "execute_tqqq"            "${{ steps.execute_tqqq.outcome }}"
          check "execute_dual"            "${{ steps.execute_dual.outcome }}"
          check "execute_sector"          "${{ steps.execute_sector.outcome }}"
          check "execute_mean"            "${{ steps.execute_mean.outcome }}"
          check "fetch_portfolio_final"   "${{ steps.fetch_portfolio_final.outcome }}"
          if [ -n "$failed" ]; then
            echo "::error::Steps failed (run continued so other strategies still executed):$failed"
            exit 1
          fi
          echo "All steps healthy."
