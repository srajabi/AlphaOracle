# Comprehensive Strategy Comparison
# Tests all strategies including:
# - Original regime rotation
# - Regime rotation with tolerance bands (Reddit-inspired)
# - Simple Reddit 200 SMA strategies
# - Various leverage levels (1x, 2x, 3x)

name: "Comprehensive Strategy Comparison"
description: "Tests all strategies with zero-fee assumptions including tolerance bands and Reddit approaches"

tickers:
  - SPY
  - QQQ
  - GLD
  - TLT
  - XLE
  - XLU

# No single-asset strategies except buy_and_hold for baseline
strategies:
  - buy_and_hold

# Test all available portfolio strategies
portfolio_strategies:
  # Original strategies without bands
  - regime_defensive_rotation
  - regime_defensive_rotation_2x
  - regime_defensive_rotation_3x
  - dual_momentum_rotation
  - top2_relative_strength_rotation

  # New strategies with tolerance bands
  - regime_defensive_rotation_with_bands
  - regime_defensive_rotation_with_bands_2x
  - regime_defensive_rotation_with_bands_3x

  # Reddit-style simple 200 SMA strategies
  - reddit_200sma_spy
  - reddit_200sma_tqqq

periods:
  lookback_days: []
  full_sample: true
  market_regimes: []

rolling_windows:
  enabled: false

transaction_cost_bps: 0  # Zero fees (realistic with modern brokers)

data_source:
  use_long_history: true

output:
  directory: "backtesting/results/comprehensive_comparison"
  save_trades: false
